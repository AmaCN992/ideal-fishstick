<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do you love Amac?</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#111,#ff0055);
    color:white;
    text-align:center;
    overflow:hidden;
}
.container{margin-top:120px;}
h1{font-size:3rem;}
p{font-size:1.2rem;opacity:0.9;}
button{
    padding:15px 30px;margin:15px;font-size:1.2rem;border:none;
    border-radius:12px;cursor:pointer;transition:0.2s;
}
#yes{background:#00c853;color:white;}
#yes:hover{transform:scale(1.1);}
#no{background:#ff1744;color:white;position:relative;}
</style>
</head>
<body>
<div class="container">
<h1>Do you love Amac? 😏</h1>
<p>Choose wisely...</p>
<button id="yes" onclick="window.location.href='yes.html'">Yes 😍</button>
<button id="no" onmouseover="moveNo()">No 🤡</button>
</div>
<script>
const savageTexts = ["Liar 🤨","Try again 🤡","Wrong answer 💀","Stop the cap 🧢","Be serious 😭","Nobody believes you 😏","Nice joke 😂","Denied ❌"];
function moveNo(){
 const btn=document.getElementById("no");
 btn.innerText=savageTexts[Math.floor(Math.random()*savageTexts.length)];
 btn.style.position="absolute";
 btn.style.left=Math.random()*80+"%";
 btn.style.top=Math.random()*80+"%";
}
</script>
</body>
</html>
