<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do You Love Amac? 🧁💖</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #ffd6e8, #fff0f7);
      font-family: "Comic Sans MS", cursive, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    h1 {
      color: #ff2e88;
      font-size: 2.8rem;
      margin-bottom: 5px;
      text-shadow: 0px 0px 15px rgba(255, 46, 136, 0.4);
    }

    p {
      font-size: 1.6rem;
      color: #cc0066;
      margin: 10px 0 25px;
      font-weight: bold;
    }

    .cupcake {
      font-size: 90px;
      animation: bounce 1s infinite alternate;
      margin-bottom: 15px;
      filter: drop-shadow(0px 8px 10px rgba(0,0,0,0.15));
    }

    @keyframes bounce {
      from { transform: translateY(0px) rotate(-2deg); }
      to { transform: translateY(-18px) rotate(2deg); }
    }

    .buttons {
      display: flex;
      gap: 20px;
      margin-top: 10px;
    }

    button {
      padding: 12px 26px;
      font-size: 1.3rem;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: bold;
      box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
    }

    #yesBtn {
      background: #ff2e88;
      color: white;
    }

    #yesBtn:hover {
      transform: scale(1.1);
      box-shadow: 0px 0px 25px rgba(255, 46, 136, 0.6);
    }

    #noBtn {
      background: #ff8fbf;
      color: white;
      position: relative;
    }

    #finalScreen {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    #finalText {
      font-size: 2rem;
      color: #ff0066;
      margin-top: 10px;
      text-shadow: 0px 0px 12px rgba(255,0,102,0.4);
    }

    #sendPicText {
      font-size: 1.4rem;
      color: #cc0066;
      margin-top: 15px;
      font-weight: bold;
    }

    #whatsappBtn {
      margin-top: 18px;
      padding: 12px 20px;
      background: #25d366;
      color: white;
      font-size: 1.2rem;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      transition: 0.2s ease;
    }

    #whatsappBtn:hover {
      transform: scale(1.08);
      box-shadow: 0px 0px 20px rgba(37,211,102,0.5);
    }

    /* Floating Hearts */
    .heart {
      position: absolute;
      font-size: 22px;
      animation: floatUp 5s linear infinite;
      opacity: 0.8;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1.6);
        opacity: 0;
      }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <canvas id="confetti"></canvas>

  <!-- MAIN SCREEN -->
  <div id="mainScreen">
    <div class="cupcake">🧁</div>
    <h1>Hey Cutie 💖</h1>
    <p id="questionText">Do you love Amac? 😘</p>

    <div class="buttons">
      <button id="yesBtn">Yes 😍</button>
      <button id="noBtn">No 🙈</button>
    </div>
  </div>

  <!-- FINAL SCREEN -->
  <div id="finalScreen">
    <div class="cupcake">🧁💖</div>
    <div id="finalText">YAYYYYY 😍💞</div>
    <div id="sendPicText">
      If you love Amac...<br>
      send him your prettiest pic 📸✨
    </div>

    <button id="whatsappBtn">Send Amac a Message 💌</button>
  </div>

  <audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

<script>
  const noBtn = document.getElementById("noBtn");
  const yesBtn = document.getElementById("yesBtn");
  const mainScreen = document.getElementById("mainScreen");
  const finalScreen = document.getElementById("finalScreen");
  const questionText = document.getElementById("questionText");
  const whatsappBtn = document.getElementById("whatsappBtn");
  const bgMusic = document.getElementById("bgMusic");

  let yesSize = 1;

  // Floating hearts
  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = ["💖","💘","💕","❤️","🧁"][Math.floor(Math.random()*5)];
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 15 + 18 + "px";
    heart.style.animationDuration = Math.random() * 2 + 3 + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }
  setInterval(createHeart, 350);

  // No button moves away (like original)
  noBtn.addEventListener("mouseover", () => {
    let x = Math.random() * (window.innerWidth - noBtn.clientWidth);
    let y = Math.random() * (window.innerHeight - noBtn.clientHeight);

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    // Make YES bigger every time she tries to say no 😈
    yesSize += 0.08;
    yesBtn.style.transform = `scale(${yesSize})`;

    const texts = [
      "No?? 😭",
      "Are you sure?? 🥺",
      "Don't break Amac's heart 💔",
      "Come onnn 😭💖",
      "Say YES 😤💘"
    ];
    questionText.innerText = texts[Math.floor(Math.random() * texts.length)];
  });

  // Confetti setup
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let confetti = [];

  function launchConfetti() {
    confetti = [];
    for (let i = 0; i < 220; i++) {
      confetti.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        r: Math.random() * 6 + 2,
        d: Math.random() * 20 + 10,
        color: `hsl(${Math.random() * 360}, 100%, 70%)`
      });
    }
  }

  function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    confetti.forEach((c) => {
      ctx.beginPath();
      ctx.fillStyle = c.color;
      ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
      ctx.fill();
    });
    updateConfetti();
  }

  function updateConfetti() {
    confetti.forEach((c) => {
      c.y += 5;
      c.x += Math.sin(c.d) * 2;
      if (c.y > canvas.height) {
        c.y = -10;
        c.x = Math.random() * canvas.width;
      }
    });
  }

  let confettiInterval;

  // YES click
  yesBtn.addEventListener("click", () => {
    bgMusic.play();

    mainScreen.style.display = "none";
    finalScreen.style.display = "flex";

    launchConfetti();
    confettiInterval = setInterval(drawConfetti, 20);
  });

  // WhatsApp button (change number)
  whatsappBtn.addEventListener("click", () => {
    const phone = "+33629345289"; // CHANGE THIS TO AMAC NUMBER
    const message = encodeURIComponent("Yesss 😍💖 I love you Amac! 🧁✨");
    window.open(`https://wa.me/${phone}?text=${message}`, "_blank");
  });

  // Resize canvas
  window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
</script>

</body>
</html>
